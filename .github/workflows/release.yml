name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release in this repo

jobs:
  release:
    runs-on: macos-14 # Apple Silicon, matching the supported target
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Check tag matches Cargo version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          echo "tag=$tag cargo=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match [workspace.package] version $ver"
            exit 1
          fi

      - name: Test (gate)
        run: cargo test --workspace --locked

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME"

      - name: Compute source tarball sha256
        id: sha
        run: |
          url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          sha="$(curl -fsSL "$url" | shasum -a 256 | cut -d' ' -f1)"
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "source sha256: $sha"

      - name: Render and push formula to the tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is not set (need a PAT with Contents:write on mrsmsn/homebrew-tap)"
            exit 1
          fi
          ver="${GITHUB_REF_NAME#v}"
          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/mrsmsn/homebrew-tap.git" tap
          mkdir -p tap/Formula
          sed -e "s/@VERSION@/${ver}/g" \
              -e "s/@SHA256@/${{ steps.sha.outputs.sha256 }}/g" \
              .github/templates/issue.rb > tap/Formula/issue.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/issue.rb
          if git diff --cached --quiet; then
            echo "formula already up to date"
          else
            git commit -m "issue ${GITHUB_REF_NAME}"
            git push
          fi
